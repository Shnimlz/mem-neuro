# SearXNG settings.yml for Cerebro Autónomo integration
use_default_settings: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "antonio-super-secret-key-searxng"

search:
  safe_search: 0
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: go
    timeout: 3.0
  - name: duckduckgo
    engine: duckduckgo
    shortcut: dd
    timeout: 3.0
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    timeout: 2.0
